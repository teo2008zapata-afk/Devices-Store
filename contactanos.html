<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Contactanos</title>

</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="img/logo.png" alt="" class="logo">
            </div>
            <ul class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="sobrenosotros.html">Sobre Nosotros</a>
                <a href="contactanos.html">Contactanos</a> 
                <a href="iniciarsesion.html">Iniciar Sesion</a> 
                <a href="registrarse.html">Registrarse</a> 
            </ul>
        </nav>
    </header>
    <h3>Cuentanos tus dudas:</h3>
    <div class="square">
        <form action="formcontactanos.html"method="POST">
                <label>Ingrese Su Nombre:</label><br>
                <input type="text" placeholder="Nombre Completo" id="usuario" name="usuario" class="rellenar">
                <br><br>
                <label>Ingrese Su Correo Electronico:</label><br>
                <input type="email" placeholder="ejemplo@correo.com" id="correo" name="correo" class="rellenar">
                <br><br>
                <label>Ingrese Su Numero De Telefono:</label><br>
                <input type="number" placeholder="Numero De Celular O Fijo" id="numero" name="numero" class="rellenar">
                <br><br>
                <label>Mensaje:</label><br>
                <textarea placeholder="Escribe Aqui Tus Dudas O Recomendaciones" id="mensaje" name="mensaje" class="mensaje"></textarea>
                <br><br>
                <input type="submit" value="Enviar Comentario" class="boton">
        </form>
    </div>
</body>
</html>
