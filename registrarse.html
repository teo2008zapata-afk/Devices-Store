<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Registrarse</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="img/logo.png" alt="" class="logo">
            </div>
            <ul class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="sobrenosotros.html">Sobre Nosotros</a>
                <a href="contactanos.html">Contactanos</a> 
                <a href="iniciarsesion.html">Iniciar Sesion</a> 
                <a href="registrarse.html">Registrarse</a> 
            </ul>
        </nav>
    </header>
    <h3>Registrarse:</h3>
    <div class="square">
        <form action="formregistrarse.html" method="post">
            <label>Ingrese Sus Nombres:</label><br>
            <input type="text" placeholder="Nombre Completo "id="nombre" name="nombre" class="rellenar"><br><br>
            <label>Ingrese Sus Apellidos:</label><br>
            <input type="text" placeholder="Apellidos "id="apellido" name="apellido" class="rellenar"><br><br>
            <label>Ingrese Su Nombre de Usuario:</label><br>
            <input type="text" placeholder="Usuario "id="ususario" name="usuario" class="rellenar"><br><br>
            <label>Ingrese Su Numero de Telefono:</label><br>
            <input type="number" placeholder="Numero De Celular O Fijo "id="numero" name="numero" class="rellenar"><br><br>
            <label>Ingrese Su Correo Electronico:</label><br>
            <input type="email" placeholder="ejemplo@correo.com" id="correo" name="correo" class="rellenar"><br><br>
            <label>Ingrese Su Contraseña:</label><br>
            <input type="password" placeholder="Contraseña "id="contraseña" name="contraseña" class="rellenar"><br><br>
            <input type="submit" value="Registrarse" class="boton">
        </form>
    </div>

</body>
</html>
